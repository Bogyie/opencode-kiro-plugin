name: Publish npm package

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json

permissions:
  contents: read

jobs:
  prepare:
    name: Determine package version bump
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine package version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="v${VERSION}"
          SHOULD_PUBLISH="false"

          BEFORE="${{ github.event.before }}"
          PREVIOUS_VERSION=""

          if git cat-file -e "${BEFORE}:package.json" 2>/dev/null; then
            PREVIOUS_VERSION="$(
              git show "${BEFORE}:package.json" \
                | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).version));"
            )"
          fi

          if [ "$PREVIOUS_VERSION" != "$VERSION" ]; then
            if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
              echo "Tag ${TAG_NAME} already exists." >&2
              exit 1
            fi
            SHOULD_PUBLISH="true"
          fi

          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to npm
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: npm-publish-${{ needs.prepare.outputs.tag_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Verify package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ needs.prepare.outputs.version }}" ]; then
            echo "Prepared version ${{ needs.prepare.outputs.version }} does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke package
        run: npm run smoke:package

      - name: Check publish contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public

      - name: Create GitHub Release
        run: gh release create "${{ needs.prepare.outputs.tag_name }}" --target "$GITHUB_SHA" --title "${{ needs.prepare.outputs.tag_name }}" --notes "Release ${{ needs.prepare.outputs.tag_name }}"
        env:
          GH_TOKEN: ${{ github.token }}
